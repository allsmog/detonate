name: Feature request
description: Suggest a platform feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? API, UI, sandbox, analysis, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API / backend
        - Frontend
        - Sandbox / machinery
        - Static analysis
        - Dynamic analysis
        - Threat intel / AI
        - Other
    validations:
      required: true
